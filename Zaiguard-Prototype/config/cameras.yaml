# config/cameras.multicam.yaml
#
# Multi-camera test config — 3 cameras via MediaMTX RTSP relay.
#
# Prerequisites:
#   1. Place test videos in recordings/:
#        recordings/entrance.mp4
#        recordings/server_room.mp4
#        recordings/parking.mp4
#   2. Start MediaMTX:
#        docker compose -f tools/docker-compose.streams.yaml up -d
#   3. Copy this file over cameras.yaml (or symlink):
#        copy config\cameras.multicam.yaml config\cameras.yaml
#
# To add a phone camera:
#   - Start IP Webcam (Android) or RTSP Camera Server (iOS) on your phone
#   - Uncomment the phone_01 entry below and set the IP address
#   - The phone and your PC must be on the same Wi-Fi network
#
# To mix phone + simulated:
#   - Keep cam_01/cam_02 pointing at MediaMTX (video files)
#   - Set cam_03 to your phone's RTSP URL directly

cameras:
  # ── Laptop Camera ──────────────────────────────────────────────────────────
  - camera_id: cam_01
    label: "Laptop Camera"
    source: "${CAM_01_SOURCE:device:0}"
    enabled: true
    fps_cap: 25
    width: 1280
    height: 720

  # ── Local Video Loops ──────────────────────────────────────────────────────
  # - camera_id: cam_02
  #   label: "Server room"
  #   source: "${CAM_02_SOURCE:recordings/server_room.mp4}"
  #   enabled: true
  #   fps_cap: 25
  #   width: 1920
  #   height: 1080

  # - camera_id: cam_03
  #   label: "Parking lot"
  #   source: "${CAM_03_SOURCE:recordings/parking.mp4}"
  #   enabled: true
  #   fps_cap: 25
  #   width: 1280
  #   height: 720

  # ── Phone Camera ───────────────────────────────────────────────────────────
  - camera_id: phone_01
    label: "Phone camera"
    source: "${PHONE_CAM_SOURCE:http://ip-port/video}"
    enabled: true
    fps_cap: 15
    width: 1280
    height: 720

  # - camera_id: phone_02
  #   label: "Phone camera (iOS)"
  #   source: "rtsp://192.168.1.43:8554/live"     # RTSP Camera Server default
  #   enabled: true
  #   fps_cap: 15
  #   width: 1280
  #   height: 720

  # ── Real IP Camera (direct RTSP, no MediaMTX proxy) ────────────────────────
  # Common RTSP URL patterns:
  #   Hikvision:  rtsp://admin:pass@IP:554/Streaming/Channels/101
  #   Dahua:      rtsp://admin:pass@IP:554/cam/realmonitor?channel=1&subtype=0
  #   Reolink:    rtsp://admin:pass@IP:554/h264Preview_01_main
  #   Axis:       rtsp://root:pass@IP/axis-media/media.amp
