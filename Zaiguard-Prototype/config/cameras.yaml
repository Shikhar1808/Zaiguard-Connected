# config/cameras.yaml  — DO NOT COMMIT (gitignored)
#
# Source types supported (fallback chain tries them in this priority order):
#   rtsp://user:pass@192.168.1.x/stream   RTSP camera
#   /path/to/video.mp4                    local video file (testing)
#   http://192.168.1.x:8080/video         HTTP/MJPEG stream
#   device:0                              local webcam, index 0
#
# width/height MUST match the camera's actual stream resolution —
# used for bbox_norm / centroid_norm calculations downstream.

# cameras:
#   - camera_id: cam_01
#     label: Webcam test
#     source: device:0
#     enabled: true
#     fps_cap: 25
#     width: 1280
#     height: 720

cameras:
  - camera_id: cam_01
    label: "Front entrance"
    # source: "rtsp://admin:password@192.168.1.100/stream1"
    source: "device:0"
    enabled: true
    fps_cap: 25
    width: 1920
    height: 1080

  - camera_id: cam_02
    label: "Server room"
    source: "rtsp://admin:password@192.168.1.101/stream1"
    enabled: false
    fps_cap: 25
    width: 1920
    height: 1080

  - camera_id: cam_03
    label: "Parking lot"
    source: "rtsp://admin:password@192.168.1.102/stream1"
    enabled: false
    fps_cap: 25
    width: 1280
    height: 720